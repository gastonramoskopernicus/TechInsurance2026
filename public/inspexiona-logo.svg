<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#86198f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="none" stroke="url(#magentaGrad)" stroke-width="3" filter="url(#glow)"/>
    <path d="M 10 20 L 30 20 M 20 10 L 20 30" stroke="#fdf4ff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="#d946ef" stroke-width="2" stroke-dasharray="4 4" />
  </g>
  <!-- Text -->
  <text x="60" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    Inspe<tspan fill="#d946ef">X</tspan>iona
  </text>
</svg>