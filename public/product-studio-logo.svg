<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Gradientes de Conexión de Neón -->
    <!-- Colores base:
      Rosa/Magenta: #ff409f
      Violeta/Púrpura: #bf40ff
      Azul/Cyan: #00b0ff
      Celeste/Cyan: #00e5ff
      Verde/Teal: #1de9b6
      Amarillo: #ffea00
      Naranja: #ff9100
      Rojo/Naranja: #ff3d00
    -->
    <linearGradient id="g-v0-v1" x1="100" y1="20" x2="169.28" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff409f" />
      <stop offset="100%" stop-color="#bf40ff" />
    </linearGradient>
    <linearGradient id="g-v1-v2" x1="169.28" y1="60" x2="169.28" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bf40ff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <linearGradient id="g-v2-v3" x1="169.28" y1="140" x2="100" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#ffea00" />
    </linearGradient>
    <linearGradient id="g-v3-v4" x1="100" y1="180" x2="30.72" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffea00" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
    <linearGradient id="g-v4-v5" x1="30.72" y1="140" x2="30.72" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff3d00" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>
    <linearGradient id="g-v5-v0" x1="30.72" y1="60" x2="100" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff409f" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>

    <!-- Gradientes hacia el centro -->
    <linearGradient id="g-v0-c" x1="100" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff409f" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>
    <linearGradient id="g-v1-c" x1="169.28" y1="60" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bf40ff" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>
    <linearGradient id="g-v2-c" x1="169.28" y1="140" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>
    <linearGradient id="g-v3-c" x1="100" y1="180" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffea00" />
      <stop offset="100%" stop-color="#ff9100" />
    </linearGradient>
    <linearGradient id="g-v4-c" x1="30.72" y1="140" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff3d00" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>
    <linearGradient id="g-v5-c" x1="30.72" y1="60" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff409f" />
      <stop offset="100%" stop-color="#ff409f" />
    </linearGradient>

    <!-- Gradientes diagonales de la red interior -->
    <linearGradient id="g-diag-r1" x1="65.36" y1="40" x2="169.28" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4081" />
      <stop offset="100%" stop-color="#00b0ff" />
    </linearGradient>
    <linearGradient id="g-diag-r2" x1="30.72" y1="60" x2="169.28" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff409f" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <linearGradient id="g-diag-r3" x1="30.72" y1="100" x2="134.64" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d500f9" />
      <stop offset="100%" stop-color="#1de9b6" />
    </linearGradient>

    <linearGradient id="g-diag-l1" x1="134.64" y1="40" x2="30.72" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e040fb" />
      <stop offset="100%" stop-color="#d500f9" />
    </linearGradient>
    <linearGradient id="g-diag-l2" x1="169.28" y1="60" x2="30.72" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bf40ff" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
    <linearGradient id="g-diag-l3" x1="169.28" y1="100" x2="65.36" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b0ff" />
      <stop offset="100%" stop-color="#ff9100" />
    </linearGradient>

    <!-- Gradientes verticales -->
    <linearGradient id="g-vert-c1" x1="65.36" y1="40" x2="65.36" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4081" />
      <stop offset="50%" stop-color="#d500f9" />
      <stop offset="100%" stop-color="#ff9100" />
    </linearGradient>
    <linearGradient id="g-vert-c2" x1="134.64" y1="40" x2="134.64" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e040fb" />
      <stop offset="50%" stop-color="#aa00ff" />
      <stop offset="100%" stop-color="#1de9b6" />
    </linearGradient>

    <!-- Glow suave para los nodos -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- LÍNEAS EXTERIORES (Hexágono) -->
  <line x1="100" y1="20" x2="169.28" y2="60" stroke="url(#g-v0-v1)" stroke-width="2.5" />
  <line x1="169.28" y1="60" x2="169.28" y2="140" stroke="url(#g-v1-v2)" stroke-width="2.5" />
  <line x1="169.28" y1="140" x2="100" y2="180" stroke="url(#g-v2-v3)" stroke-width="2.5" />
  <line x1="100" y1="180" x2="30.72" y2="140" stroke="url(#g-v3-v4)" stroke-width="2.5" />
  <line x1="30.72" y1="140" x2="30.72" y2="60" stroke="url(#g-v4-v5)" stroke-width="2.5" />
  <line x1="30.72" y1="60" x2="100" y2="20" stroke="url(#g-v5-v0)" stroke-width="2.5" />

  <!-- LÍNEAS RADIALES AL CENTRO -->
  <line x1="100" y1="20" x2="100" y2="100" stroke="url(#g-v0-c)" stroke-width="2.5" />
  <line x1="169.28" y1="60" x2="100" y2="100" stroke="url(#g-v1-c)" stroke-width="2.5" />
  <line x1="169.28" y1="140" x2="100" y2="100" stroke="url(#g-v2-c)" stroke-width="2.5" />
  <line x1="100" y1="180" x2="100" y2="100" stroke="url(#g-v3-c)" stroke-width="2.5" />
  <line x1="30.72" y1="140" x2="100" y2="100" stroke="url(#g-v4-c)" stroke-width="2.5" />
  <line x1="30.72" y1="60" x2="100" y2="100" stroke="url(#g-v5-c)" stroke-width="2.5" />

  <!-- LÍNEAS DIAGONALES INTERNAS (Red isométrica) -->
  <!-- Diagonal Abajo-Derecha -->
  <line x1="65.36" y1="40" x2="169.28" y2="100" stroke="url(#g-diag-r1)" stroke-width="2.5" />
  <line x1="30.72" y1="60" x2="169.28" y2="140" stroke="url(#g-diag-r2)" stroke-width="2.5" />
  <line x1="30.72" y1="100" x2="134.64" y2="160" stroke="url(#g-diag-r3)" stroke-width="2.5" />

  <!-- Diagonal Abajo-Izquierda -->
  <line x1="134.64" y1="40" x2="30.72" y2="100" stroke="url(#g-diag-l1)" stroke-width="2.5" />
  <line x1="169.28" y1="60" x2="30.72" y2="140" stroke="url(#g-diag-l2)" stroke-width="2.5" />
  <line x1="169.28" y1="100" x2="65.36" y2="160" stroke="url(#g-diag-l3)" stroke-width="2.5" />

  <!-- Verticales Interiores -->
  <line x1="65.36" y1="40" x2="65.36" y2="160" stroke="url(#g-vert-c1)" stroke-width="2.5" />
  <line x1="134.64" y1="40" x2="134.64" y2="160" stroke="url(#g-vert-c2)" stroke-width="2.5" />

  <!-- NODOS (19 Puntos con Glow de Neón) -->
  <!-- Vértices del Hexágono Exterior -->
  <circle cx="100" cy="20" r="8" fill="#ff409f" filter="url(#glow)" />
  <circle cx="169.28" cy="60" r="8" fill="#bf40ff" filter="url(#glow)" />
  <circle cx="169.28" cy="140" r="8" fill="#00e5ff" filter="url(#glow)" />
  <circle cx="100" cy="180" r="8" fill="#ffea00" filter="url(#glow)" />
  <circle cx="30.72" cy="140" r="8" fill="#ff3d00" filter="url(#glow)" />
  <circle cx="30.72" cy="60" r="8" fill="#ff409f" filter="url(#glow)" />

  <!-- Puntos Medios del Perímetro -->
  <circle cx="134.64" cy="40" r="7.5" fill="#e040fb" filter="url(#glow)" />
  <circle cx="169.28" cy="100" r="7.5" fill="#00b0ff" filter="url(#glow)" />
  <circle cx="134.64" cy="160" r="7.5" fill="#1de9b6" filter="url(#glow)" />
  <circle cx="65.36" cy="160" r="7.5" fill="#ff9100" filter="url(#glow)" />
  <circle cx="30.72" cy="100" r="7.5" fill="#d500f9" filter="url(#glow)" />
  <circle cx="65.36" cy="40" r="7.5" fill="#ff4081" filter="url(#glow)" />

  <!-- Puntos del Centro y Radios Internos -->
  <circle cx="100" cy="100" r="9" fill="#ff409f" filter="url(#glow)" />
  <circle cx="100" cy="60" r="8" fill="#e040fb" filter="url(#glow)" />
  <circle cx="134.64" cy="80" r="8" fill="#aa00ff" filter="url(#glow)" />
  <circle cx="134.64" cy="120" r="8" fill="#00b0ff" filter="url(#glow)" />
  <circle cx="100" cy="140" r="8" fill="#ff9100" filter="url(#glow)" />
  <circle cx="65.36" cy="120" r="8" fill="#ff1744" filter="url(#glow)" />
  <circle cx="65.36" cy="80" r="8" fill="#d500f9" filter="url(#glow)" />
</svg>
